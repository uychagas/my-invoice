name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read
  id-token: write

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.4", "8.5"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php-version }}-composer-

      - name: Install dependencies
        run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

      - name: Compile asset map
        run: php bin/console asset-map:compile

      - name: Prepare test env
        run: |
          php -r "file_exists('.env.test.local') || copy('.env.test', '.env.test.local');"
          mkdir -p data
          touch data/database.sqlite

      - name: Run tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///%kernel.project_dir%/data/database.sqlite
        run: composer run-script test

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.5-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-composer-

      - name: Install dependencies
        run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

      - name: Compile asset map
        run: php bin/console asset-map:compile

      - name: Prepare test env
        run: |
          php -r "file_exists('.env.test.local') || copy('.env.test', '.env.test.local');"
          mkdir -p data build/logs build/coverage
          touch data/database.sqlite

      - name: Run coverage
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///%kernel.project_dir%/data/database.sqlite
        run: php -d xdebug.mode=coverage bin/phpunit --coverage-clover build/logs/clover.xml --coverage-html build/coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: build/logs/clover.xml
          use_oidc: true
          fail_ci_if_error: true
          verbose: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            build/logs/clover.xml
            build/coverage
